name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Security Audit ----
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        working-directory: ./contracts
        run: cargo audit

  # ---- Rust Contracts ----
  rust-contracts:
    name: Rust Contracts
    runs-on: ubuntu-latest
    needs: security-audit
    strategy:
      matrix:
        contract: [invoice, pool, credit_score]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo clippy -- -D warnings

      - name: Build contract
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo test --verbose

      - name: Run fuzz tests
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo test --test fuzz_tests --verbose
        continue-on-error: false

  # ---- WASM Size Check ----
  check-wasm-size:
    name: Check Wasm binary sizes
    runs-on: ubuntu-latest
    needs: rust-contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Check sizes
        run: |
          MAX_SIZE_BYTES=204800
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(stat -c%s "$wasm")
            echo "$wasm: $SIZE bytes"
            if [ "$SIZE" -gt "$MAX_SIZE_BYTES" ]; then
              echo "ERROR: $wasm exceeds limit"
              exit 1
            fi
          done

  # ---- Frontend ----
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  # ---- Dependency Scanning ----
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g npm-audit-resolver
          npm audit --audit-level=high

  # ---- E2E Tests (Playwright) ----
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_USDC_TOKEN_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_USDC_TOKEN_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ---- Integration Tests ----
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-contracts, frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build all contracts
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run integration tests
        working-directory: ./contracts
        run: cargo test --test integration_tests --verbose

      - name: Run all contract tests with timing
        id: contract-tests
        working-directory: ./contracts
        run: |
          START=$(date +%s)
          cargo test --workspace --verbose 2>&1 | tee test-output.txt
          END=$(date +%s)
          ELAPSED=$((END-START))
          echo "contract_test_duration_s=${ELAPSED}" >> $GITHUB_OUTPUT
          echo "Test suite completed in ${ELAPSED} seconds"

      - name: Check test execution time
        run: |
          ELAPSED=${{ steps.contract-tests.outputs.contract_test_duration_s }}
          MAX_SECONDS=120
          echo "Test duration: ${ELAPSED}s"
          if [ "${ELAPSED}" -gt "${MAX_SECONDS}" ]; then
            echo "⚠️  WARNING: Tests took ${ELAPSED}s, exceeding ${MAX_SECONDS}s threshold"
          else
            echo "✅ Tests completed within ${MAX_SECONDS}s threshold"
          fi

      - name: Run benchmarks
        working-directory: ./contracts
        run: cargo bench --bench contract_benchmarks

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: contract-benchmarks-${{ github.sha }}
          path: |
            contracts/target/criterion/
            contracts/test-output.txt
          retention-days: 30

  # ---- Deploy to Testnet ----
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [rust-contracts, frontend, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet
    outputs:
      INVOICE_CONTRACT_ID: ${{ steps.deploy-invoice.outputs.INVOICE_CONTRACT_ID }}
      POOL_CONTRACT_ID: ${{ steps.deploy-pool.outputs.POOL_CONTRACT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked

      - name: Build contracts
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Configure Stellar CLI
        run: |
          stellar keys add deployer --secret-key "${{ secrets.TESTNET_DEPLOYER_KEY }}"

      - name: Deploy Invoice Contract
        id: deploy-invoice
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/invoice.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "INVOICE_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Deploy Pool Contract
        id: deploy-pool
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/pool.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "POOL_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Deploy Credit Score Contract
        id: deploy-credit
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/credit_score.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "CREDIT_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Summary
        run: |
          echo "### Testnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Invoice Contract: ${{ steps.deploy-invoice.outputs.INVOICE_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pool Contract: ${{ steps.deploy-pool.outputs.POOL_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Credit Score Contract: ${{ steps.deploy-credit.outputs.CREDIT_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY

  # ---- Smoke Tests ----
  smoke-test-testnet:
    name: Testnet Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-testnet]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked
      - name: Configure Stellar CLI
        run: |
          stellar keys add tester --secret-key "${{ secrets.TESTNET_SMOKE_TEST_KEY }}"
      - name: Run Smoke Tests
        timeout-minutes: 2
        env:
          INVOICE_CONTRACT_ID: ${{ needs.deploy-testnet.outputs.INVOICE_CONTRACT_ID }}
          POOL_CONTRACT_ID: ${{ needs.deploy-testnet.outputs.POOL_CONTRACT_ID }}
        run: |
          echo "Test 1: Contract Reachability"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --source-account tester --network testnet -- get_invoice_count
          
          echo "Test 2: Pool Config Readable"
          stellar contract invoke --id $POOL_CONTRACT_ID --source-account tester --network testnet -- get_config
          
          echo "Test 3: End-to-End Mini Lifecycle"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --source-account tester --network testnet -- create_invoice --owner tester --debtor "Smoke Test" --amount 1000 --due_date 1735689600
          # We don't have the returned ID easily but we can check if it didn't fail
          
          echo "Test 4: Contract Version Check"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --network testnet -- version
      
      - name: Post Failure Comment
        if: failure()
        uses: peter-evans/commit-comment@v3
        with:
          body: "⚠️ Testnet deployment smoke tests failed"
      
      - name: Send Webhook Alert
        if: failure()
        run: |
          if [ -n "${{ secrets.ALERT_WEBHOOK_URL }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d '{"text": "⚠️ Testnet deployment smoke tests failed"}' \
              ${{ secrets.ALERT_WEBHOOK_URL }}
          fi
