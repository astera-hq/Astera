  deploy-smoke-test:
    name: Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [contracts]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    env:
      # GitHub withholds repository secrets from `pull_request` runs
      # triggered by a fork (by design — a fork PR can't be trusted with
      # deploy credentials), so TESTNET_DEPLOYER_SECRET is empty for any
      # external contribution and every step below would fail immediately on
      # `--source-account` with nothing to actually test. `secrets`/`env`
      # aren't usable in a job-level `if:`, so every secret-dependent step is
      # individually guarded on this instead — they skip cleanly on fork PRs
      # and run for real whenever the secret *is* available (e.g. a
      # maintainer's own branch).
      HAS_DEPLOY_SECRET: ${{ secrets.TESTNET_DEPLOYER_SECRET != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Soroban CLI
        if: env.HAS_DEPLOY_SECRET == 'true'
        # Building soroban-cli from source via `cargo install` pulls in native
        # deps (libdbus, libudev, ...) that keep drifting on the runner image
        # and take 10+ minutes to compile. Download the prebuilt stellar-cli
        # release instead and symlink it as `soroban` — same tool (stellar-cli
        # is soroban-cli's current name), same CLI surface, no native build.
        run: |
          curl -sSfL -o stellar-cli.tar.gz \
            https://github.com/stellar/stellar-cli/releases/download/v27.0.0/stellar-cli-27.0.0-x86_64-unknown-linux-gnu.tar.gz
          tar xzf stellar-cli.tar.gz
          sudo install -m 755 stellar /usr/local/bin/stellar
          sudo ln -sf /usr/local/bin/stellar /usr/local/bin/soroban
          soroban --version
      - name: Build contracts
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          cargo build --target wasm32-unknown-unknown --release -p invoice -p pool -p credit_score -p share
      - name: Deploy invoice contract to testnet
        id: deploy-invoice
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/invoice.wasm \
            --source ${{ secrets.TESTNET_DEPLOYER_SECRET }} \
            --network testnet \
            --fee 1000000)
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Invoice contract ID: $CONTRACT_ID"
      - name: Smoke test invoice contract
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          soroban contract invoke \
            --id ${{ steps.deploy-invoice.outputs.contract_id }} \
            --fn get_invoice \
            --arg 999 \
            --network testnet
          # Should return InvoiceError::InvoiceNotFound — verify it doesn't crash
      - name: Deploy pool contract to testnet
        id: deploy-pool
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/pool.wasm \
            --source ${{ secrets.TESTNET_DEPLOYER_SECRET }} \
            --network testnet \
            --fee 1000000)
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Pool contract ID: $CONTRACT_ID"
      - name: Smoke test pool contract
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          soroban contract invoke \
            --id ${{ steps.deploy-pool.outputs.contract_id }} \
            --fn version \
            --network testnet
      - name: Deploy credit_score contract to testnet
        id: deploy-credit-score
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/credit_score.wasm \
            --source ${{ secrets.TESTNET_DEPLOYER_SECRET }} \
            --network testnet \
            --fee 1000000)
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Credit score contract ID: $CONTRACT_ID"
      - name: Smoke test credit_score contract
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          soroban contract invoke \
            --id ${{ steps.deploy-credit-score.outputs.contract_id }} \
            --fn version \
            --network testnet
      - name: Deploy share contract to testnet
        id: deploy-share
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/share.wasm \
            --source ${{ secrets.TESTNET_DEPLOYER_SECRET }} \
            --network testnet \
            --fee 1000000)
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Share contract ID: $CONTRACT_ID"
      - name: Smoke test share contract
        if: env.HAS_DEPLOY_SECRET == 'true'
        run: |
          soroban contract invoke \
            --id ${{ steps.deploy-share.outputs.contract_id }} \
            --fn total_supply \
            --network testnet
      - name: Save contract IDs to file
        if: always()
        run: |
          echo "invoice=${{ steps.deploy-invoice.outputs.contract_id }}" > contract-ids.txt
          echo "pool=${{ steps.deploy-pool.outputs.contract_id }}" >> contract-ids.txt
          echo "credit_score=${{ steps.deploy-credit-score.outputs.contract_id }}" >> contract-ids.txt
          echo "share=${{ steps.deploy-share.outputs.contract_id }}" >> contract-ids.txt
      - name: Upload contract IDs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-contract-ids
          path: contract-ids.txt
          retention-days: 30
