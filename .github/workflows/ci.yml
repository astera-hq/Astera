name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      # contracts/tests (package `integration-tests`) is itself a workspace
      # member and uses soroban_sdk::contractimport! to load prebuilt .wasm
      # files, so these must exist before ANY `cargo test` invocation that
      # touches the full workspace — including the unqualified one below.
      - name: Build contracts for integration tests
        run: cargo build --target wasm32v1-none --release -p invoice -p pool -p credit_score -p share -p oracle_registry
      - run: cargo test
      - run: cargo test -p invoice --test fuzz_tests -p pool --test fuzz_tests -p credit_score --test fuzz_tests -p share --test fuzz_tests -p oracle_registry --test fuzz_tests
      - run: cargo test -p integration-tests --test integration_tests
      - name: Check WASM size
        run: |
          cargo build --target wasm32-unknown-unknown --release
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(wc -c < "$wasm" | tr -d ' ')
            echo "$wasm: $SIZE bytes"
            if [ "$SIZE" -gt 204800 ]; then
              echo "ERROR: Binary too large for deployment"
              exit 1
            fi
          done

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build contracts
        run: cargo build --target wasm32v1-none --release -p invoice -p pool -p credit_score -p share -p oracle_registry

      - name: Run cross-contract integration tests
        run: cargo test --manifest-path ../contracts/tests/Cargo.toml

  # E2E Tests job is temporarily disabled: frontend/e2e/contract-ids.ts
  # deliberately fails fast in CI when real (non-placeholder) contract IDs
  # aren't configured (#395), and this job has only ever supplied literal
  # dummy IDs (CBBBB…, CDDDD…, CCCCC…) via env vars below, not real deployed
  # contracts. Re-enable once either (a) a step deploys real contracts to a
  # local Stellar network before Playwright runs, or (b) real testnet
  # contract IDs are wired in via repository variables
  # (TESTNET_INVOICE_CONTRACT_ID / TESTNET_POOL_CONTRACT_ID).
  #
  # e2e:
  #   name: E2E Tests
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: frontend
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #         cache: npm
  #         cache-dependency-path: frontend/package-lock.json
  #     - run: npm ci
  #     - run: npx playwright install --with-deps chromium
  #     - run: npm run test:e2e
  #       env:
  #         NEXT_PUBLIC_NETWORK: testnet
  #         NEXT_PUBLIC_INVOICE_CONTRACT_ID: CBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
  #         NEXT_PUBLIC_POOL_CONTRACT_ID: CDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDD
  #         NEXT_PUBLIC_USDC_TOKEN_ID: CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC
  #     - name: Upload E2E artifacts
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: playwright-report
  #         path: frontend/playwright-report/
