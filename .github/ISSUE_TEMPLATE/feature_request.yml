name: Feature Request
description: Propose a new feature or improvement for Astera
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please provide as much context as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What problem does this feature address? Who is affected?
      placeholder: As a … I want … so that …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is your proposed solution better?

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      multiple: true
      options:
        - Smart Contract (invoice)
        - Smart Contract (pool)
        - Frontend
        - SDK
        - Mock Service
        - Docs / DevOps
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low — nice to have
        - Medium — important but not blocking
        - High — blocking a use-case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, related issues, or external references.
