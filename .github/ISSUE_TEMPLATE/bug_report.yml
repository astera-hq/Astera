name: Bug Report
description: Report a bug to help us improve Astera
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the problem.
      placeholder: |
        1. Go to '…'
        2. Click on '…'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Smart Contract (invoice)
        - Smart Contract (pool)
        - Frontend
        - SDK
        - Mock Service
        - Docs / DevOps
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 14, Ubuntu 22.04, Windows 11

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g. Chrome 124, Firefox 126, Safari 17

  - type: input
    id: wallet
    attributes:
      label: Wallet & Version
      placeholder: e.g. Freighter 5.0.0

  - type: dropdown
    id: network
    attributes:
      label: Stellar Network
      options:
        - Testnet
        - Mainnet
        - Local (Quickstart)

  - type: input
    id: contract_address
    attributes:
      label: Contract Address (if on-chain bug)
      placeholder: C…

  - type: input
    id: tx_hash
    attributes:
      label: Transaction Hash (if on-chain bug)
      placeholder: 64-char hex hash

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Messages
      description: Paste any console errors, Soroban diagnostic events, or stack traces.
      render: text
