version: '3.8'

services:
  stellar:
    image: stellar/quickstart:testing
    command: --local
    ports:
      - "8000:8000"
      - "11626:11626"
    volumes:
      - stellar-data:/opt/stellar

  contracts:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    volumes:
      - ./contracts:/app
    depends_on:
      - stellar
    command: tail -f /dev/null

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - stellar
      - contracts

  mock-service:
    image: node:20-alpine
    working_dir: /mock-service
    volumes:
      - ./mock-service:/mock-service
    command: npx -y json-server@0.17.4 --watch db.json --port 4000 --host 0.0.0.0
    ports:
      - "4000:4000"

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./indexer/data:/indexer/data
    environment:
      - HORIZON_URL=https://horizon-testnet.stellar.org
      - CONTRACT_IDS=
      - POLLING_INTERVAL_MS=5000
      - API_PORT=3001
      - DB_PATH=/indexer/data/indexer.db
    depends_on:
      - stellar
    restart: unless-stopped

  oracle-service:
    build:
      context: ./oracle-service
      dockerfile: Dockerfile
    environment:
      - RPC_URL=http://stellar:8000/soroban/rpc
      - HORIZON_URL=http://stellar:8000
      - NETWORK_PASSPHRASE=Standalone Network ; February 2017
      - ORACLE_SECRET_KEY=${ORACLE_SECRET_KEY}
      - INVOICE_CONTRACT_ID=${INVOICE_CONTRACT_ID}
      - AUTO_VERIFY_DELAY_MS=30000
    depends_on:
      - stellar
      - contracts
    volumes:
      - ./oracle-service:/app
      - ./sdk:/sdk
    restart: unless-stopped

volumes:
  stellar-data:
